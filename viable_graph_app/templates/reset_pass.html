<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    {% load static %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            color: #1a1a1a;
        }

        .page-wrap {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow: hidden;
        }

        /* background image */
        .page-wrap::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: url('{% static "images/reset_pass_back.png" %}');
            background-size: cover;
            background-position: center;
            filter: brightness(0.92) saturate(0.9);
            z-index: 0;
        }

        /* light pink overlay */
        .page-wrap::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(160deg,
                    rgba(230, 180, 220, 0.45) 0%,
                    rgba(245, 210, 235, 0.35) 50%,
                    rgba(200, 180, 230, 0.40) 100%);
            z-index: 1;
        }

        /* back button */
        .back-btn {
            position: absolute;
            left: 1.4rem;
            top: 1.4rem;
            z-index: 3;
            width: 2.6rem;
            height: 2.6rem;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.75);
            border: 1.5px solid rgba(200, 100, 160, 0.3);
            color: #c0187a;
            font-size: 1.2rem;
            display: grid;
            place-items: center;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, transform 0.2s;
            backdrop-filter: blur(8px);
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.95);
            transform: translateX(-2px);
        }

        /* title */
        .page-title {
            position: relative;
            z-index: 2;
            font-family: 'IBM Plex Sans Thai', sans-serif;
            font-size: clamp(2.8rem, 8vw, 5rem);
            font-weight: 700;
            color: #8b0050;
            letter-spacing: 0.02em;
            margin-bottom: 1.4rem;
            text-align: center;
            animation: fadeDown 0.6s ease both;
        }

        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* main panel */
        .reset-panel {
            position: relative;
            z-index: 2;
            width: min(680px, 100%);
            background: rgba(255, 255, 255, 0.68);
            border: 1.5px solid rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(20px);
            border-radius: 24px;
            padding: 2.8rem 3rem;
            box-shadow: 0 12px 60px rgba(150, 0, 80, 0.10), 0 2px 8px rgba(0, 0, 0, 0.06);
            animation: fadeUp 0.6s ease 0.1s both;
        }

        .panel-desc {
            font-size: 1.05rem;
            color: #1a1a1a;
            margin-bottom: 1.8rem;
            font-weight: 400;
            line-height: 1.5;
        }

        .reset-form {
            display: grid;
            gap: 0.5rem;
        }

        /* input */
        .input-wrap {
            position: relative;
        }

        .input-wrap input {
            width: 100%;
            padding: 1rem 1.2rem;
            border-radius: 999px;
            border: 1.8px solid #1a1a1a;
            background: rgba(255, 255, 255, 0.85);
            color: #1a1a1a;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-wrap input::placeholder {
            color: rgba(60, 30, 50, 0.45);
        }

        .input-wrap input:focus {
            border-color: #d4007a;
            box-shadow: 0 0 0 3px rgba(212, 0, 122, 0.10);
        }

        /* resend OTP row */
        .resend-row {
            font-size: 0.93rem;
            color: #1a1a1a;
            margin: 0.3rem 0 1rem 1.2rem;
        }

        .resend-row a {
            color: #d4007a;
            font-weight: 600;
            text-align: center;
            text-decoration: underline;
            text-underline-offset: 3px;
            cursor: pointer;
        }

        .resend-row a:hover {
            color: #8b0050;
        }

        /* password input with toggle */
        .password-wrap {
            position: relative;
        }

        .password-wrap input {
            padding-right: 3rem;
        }

        .password-toggle {
            position: absolute;
            right: 1.1rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            opacity: 0.5;
            transition: opacity 0.2s;
            display: flex;
            align-items: center;
        }

        .password-toggle:hover {
            opacity: 0.85;
        }

        .password-toggle img {
            width: 22px;
            height: 22px;
        }

        /* error box */
        .error-box {
            display: none;
            color: #c0002a;
            font-size: 0.83rem;
            padding: 0.55rem 1rem;
            background: rgba(220, 0, 50, 0.07);
            border: 1px solid rgba(220, 0, 50, 0.25);
            border-radius: 10px;
            line-height: 1.6;
            margin-top: 0.2rem;
        }

        /* messages from Django */
        .messages {
            margin-bottom: 1.2rem;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .message {
            padding: 0.75rem 1rem;
            border-radius: 12px;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .message.error {
            border: 1px solid rgba(220, 0, 50, 0.35);
            background: rgba(220, 0, 50, 0.08);
            color: #9a0022;
        }

        .message.success {
            border: 1px solid rgba(0, 160, 80, 0.35);
            background: rgba(0, 160, 80, 0.08);
            color: #005a28;
        }

        /* submit button */
        .reset-button {
            display: block;
            width: fit-content;
            margin: 1.4rem auto 0;
            padding: 0.9rem 2.5rem;
            border-radius: 999px;
            border: 2px solid #d4007a;
            background: #f9d0e8;
            color: #d4007a;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, color 0.2s, transform 0.15s;
            letter-spacing: 0.03em;
        }

        .reset-button:hover {
            background: #d4007a;
            color: #ffffff;
            transform: translateY(-1px);
        }

        @media (max-width: 520px) {
            .reset-panel {
                padding: 2rem 1.4rem;
            }

            .back-btn {
                top: 1rem;
                left: 1rem;
            }
        }
    </style>
</head>

<body>
    <div class="page-wrap">

        <button class="back-btn" onclick="history.back()" title="Go back">&#8592;</button>

        <h1 class="page-title">Reset Password</h1>

        <section class="reset-panel">
            <p class="panel-desc">We will send you an OTP number for resetting your password</p>

            {% if messages %}
            <div class="messages">
                {% for message in messages %}
                <div class="message {{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
            {% endif %}

            <form class="reset-form" method="post" action="{% url 'reset_password' %}">
                {% csrf_token %}

                <!-- OTP input -->
                <div class="input-wrap">
                    <input type="text" name="otp" placeholder="Fill your OTP Number" maxlength="6"
                        autocomplete="one-time-code">
                </div>

                <div class="resend-row">
                    Haven't received OTP yet? <a onclick="resendOTP()">Resend OTP</a>
                </div>

                <!-- New password input -->
                <div class="input-wrap password-wrap">
                    <input id="new-password" type="password" name="new_password" placeholder="Your New Password"
                        oninput="validatePassword(this.value)">
                    <span class="password-toggle" onclick="togglePassword()" title="Toggle password">
                        <img id="toggle-icon" src="{% static 'images/eye_open.png' %}" width="22" height="22">
                    </span>
                </div>

                <div id="password-error" class="error-box"></div>

                <button type="submit" class="reset-button">Reset Password</button>
            </form>
        </section>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('new-password');
            const icon = document.getElementById('toggle-icon');
            const eyeOpen = "{% static 'images/eye_open.png' %}";
            const eyeClose = "{% static 'images/eye_close.png' %}";
            if (input.type === 'password') {
                input.type = 'text';
                icon.src = eyeClose;
            } else {
                input.type = 'password';
                icon.src = eyeOpen;
            }
        }

        function validatePassword(value) {
            const errorBox = document.getElementById('password-error');
            const errors = [];

            if (value.length === 0) {
                errorBox.style.display = 'none';
                return;
            }

            if (value.length < 8)
                errors.push('• ต้องมีอย่างน้อย 8 ตัวอักษร');
            if (!/[a-z]/.test(value))
                errors.push('• ต้องมีตัวอักษรพิมพ์เล็ก (a-z)');
            if (!/[A-Z]/.test(value))
                errors.push('• ต้องมีตัวอักษรพิมพ์ใหญ่ (A-Z)');
            if (!/[0-9]/.test(value))
                errors.push('• ต้องมีตัวเลข (0-9)');
            if (!/[^a-zA-Z0-9]/.test(value))
                errors.push('• ต้องมีอักขระพิเศษ เช่น !@#$%');

            if (errors.length > 0) {
                errorBox.innerHTML = errors.join('<br>');
                errorBox.style.display = 'block';
            } else {
                errorBox.style.display = 'none';
            }
        }

        function resendOTP() {
            fetch("{% url 'reset_password' %}", {
                method: "POST",
                headers: {
                    "X-CSRFToken": "{{ csrf_token }}",
                    "Content-Type": "application/x-www-form-urlencoded",
                },
                body: "resend=1"
            }).then(() => {
                alert("ส่ง OTP ใหม่แล้ว กรุณาตรวจสอบอีเมลของคุณ");
            }).catch(() => {
                alert("เกิดข้อผิดพลาด กรุณาลองใหม่อีกครั้ง");
            });
        }
    </script>
</body>

</html>
