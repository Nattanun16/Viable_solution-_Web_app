<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up</title>
    {% load static %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            background: #f5e6f0;
            color: #1a1a1a;
        }

        .page-wrap {
            position: relative;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow: hidden;
        }

        .page-wrap::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: url('{% static "images/sign_up_back.png" %}');
            background-size: cover;
            background-position: center top;
            filter: brightness(0.9) saturate(0.85);
            z-index: 0;
        }

        .page-wrap::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(160deg,
                    rgba(255, 182, 220, 0.58) 0%,
                    rgba(255, 228, 245, 0.35) 50%,
                    rgba(245, 220, 230, 0.60) 100%);
            z-index: 1;
        }

        .signup-panel {
            position: relative;
            z-index: 2;
            width: min(960px, 100%);
            background: rgba(255, 255, 255, 0.86);
            border-radius: 32px;
            border: 1px solid rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(24px);
            box-shadow: 0 20px 80px rgba(130, 40, 100, 0.16);
            padding: 3rem 2.5rem 2rem;
        }

        .signup-title {
            font-family: 'IBM Plex Sans Thai', sans-serif;
            font-size: clamp(3rem, 7vw, 4.5rem);
            font-weight: 700;
            color: #760740;
            text-align: center;
            margin-bottom: 1.2rem;
        }

        .signup-form {
            display: grid;
            gap: 1rem;
        }

        .fields-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 1rem;
        }

        .field-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .field-group label {
            font-weight: 700;
            color: #2b0b2b;
        }

        .field-group input {
            width: 100%;
            border-radius: 999px;
            border: 2px solid rgba(118, 7, 64, 0.18);
            padding: 1rem 1.4rem;
            font-size: 1rem;
            outline: none;
            background: rgba(255, 255, 255, 0.95);
            color: #1a1a1a;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .field-group input:focus {
            border-color: #d4007a;
            box-shadow: 0 0 0 5px rgba(212, 0, 122, 0.12);
        }

        .signup-actions {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            margin-top: 1rem;
        }

        .btn-signup {
            border-radius: 999px;
            border: 2px solid #d4007a;
            background: #ffe0f0;
            color: #d4007a;
            padding: 1rem 2rem;
            position: absolute;
            left: 65%;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s, color 0.2s, transform 0.15s;
        }

        .btn-back-home {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
            border-radius: 999px;
            border: 1.5px solid rgba(118, 7, 64, 0.25);
            background: rgba(255, 255, 255, 0.85);
            color: #5f1637;
            padding: 0.8rem 1.4rem;
            font-weight: 700;
            text-decoration: none;
            transition: background 0.2s, transform 0.15s;
        }

        .btn-back-home:hover {
            background: #f4d4e3;
            transform: translateY(-1px);
        }

        .btn-signup:hover {
            background: #d4007a;
            color: #ffffff;
            transform: translateY(-2px);
        }

        .bot-check .g-recaptcha {
            display: flex;
            justify-content: left;
        }

        .message-box {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
            margin-bottom: 1rem;
        }

        .message {
            padding: 0.9rem 1rem;
            border-radius: 14px;
            font-size: 0.95rem;
            line-height: 1.4;
        }

        .message.error {
            background: rgba(220, 0, 50, 0.08);
            border: 1px solid rgba(220, 0, 50, 0.25);
            color: #8f0020;
        }

        .message.success {
            background: rgba(0, 140, 70, 0.08);
            border: 1px solid rgba(0, 140, 70, 0.25);
            color: #08401f;
        }

        .signup-footer {
            margin-top: 1rem;
            font-size: 0.95rem;
            color: rgba(40, 20, 40, 0.75);
            text-align: center;
        }

        .signup-footer a {
            color: #9b0d5c;
            font-weight: 700;
            text-decoration: none;
        }

        .signup-footer a:hover {
            text-decoration: underline;
        }

        @media (max-width: 820px) {
            .fields-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 600px) {
            .signup-panel {
                padding: 2rem 1.5rem 1.5rem;
            }

            .signup-actions {
                flex-direction: column;
                align-items: stretch;
            }

            .btn-signup {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="page-wrap">
        <section class="signup-panel">
            <a href="{% url 'home' %}" class="btn-back-home">←</a>
            <h1 class="signup-title">Sign Up</h1>

            {% if messages %}
            <div class="message-box">
                {% for message in messages %}
                <div class="message {{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
            {% endif %}

            <form method="post" action="{% url 'sign_up' %}" class="signup-form" onsubmit="return checkForm(event)">
                {% csrf_token %}

                <div class="fields-grid">
                    <div class="field-group">
                        <label for="email">Your Email</label>
                        <input id="email" type="email" name="email" placeholder="Enter Your Email (Chulalongkorn's Email)" required>
                    </div>
                    <div class="field-group">
                        <label for="faculty">Your Faculty</label>
                        <input id="faculty" type="text" name="faculty" placeholder="Enter Your Faculty" required>
                    </div>
                    <div class="field-group">
                        <label for="password">Your Password</label>
                        <input id="password" type="password" name="password" placeholder="Enter Your Password" required>
                        <div id="password-error" class="message error" style="display:none; margin-top:0.5rem;
                            background:transparent; border:none; padding:0; color:#8f0020; font-size:0.95rem;
                        "></div>
                    </div>
                    <div class="field-group">
                        <label for="student_id">Your Student ID</label>
                        <input id="student_id" type="text" name="student_id" placeholder="Enter your student ID"
                            required>
                    </div>
                </div>

                <div class="signup-actions">
                    <div class="bot-check"
                        style="flex:1; display:flex; align-items:center; justify-content:flex-start; padding-left:4rem;">
                        <div class="g-recaptcha" data-sitekey="{{ RECAPTCHA_SITE_KEY }}" data-theme="light"></div>
                    </div>
                    <button type="submit" class="btn-signup">Sign Up</button>
                </div>

                <p class="signup-footer">Already have an account? <a href="{% url 'login' %}">Log In</a></p>
            </form>
        </section>
    </div>
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <script>
        function validatePasswordStr(pw) {
            const errors = [];
            if (!pw || pw.length < 8) errors.push('ต้องมีอย่างน้อย 8 ตัวอักษร');
            if (!/[A-Z]/.test(pw)) errors.push('ต้องมีตัวอักษรพิมพ์ใหญ่ (A-Z)');
            if (!/[a-z]/.test(pw)) errors.push('ต้องมีตัวอักษรพิมพ์เล็ก (a-z)');
            if (!/[0-9]/.test(pw)) errors.push('ต้องมีตัวเลข (0-9)');
            if (!/[^A-Za-z0-9]/.test(pw)) errors.push('ต้องมีอักขระพิเศษ เช่น !@#$%');
            return errors;
        }

        function checkForm(e) {
            const pw = document.getElementById('password').value || '';
            const pwErrors = validatePasswordStr(pw);
            const pwErrorEl = document.getElementById('password-error');

            if (pwErrors.length > 0) {
                e.preventDefault();
                pwErrorEl.innerHTML = pwErrors.map(s => '• ' + s).join('<br>');
                pwErrorEl.style.display = 'block';
                return false;
            } else {
                pwErrorEl.style.display = 'none';
            }

            const token = (typeof grecaptcha !== 'undefined') ? grecaptcha.getResponse() : '';
            if (!token) {
                e.preventDefault();
                alert('กรุณายืนยัน reCAPTCHA ก่อนสมัคร');
                return false;
            }
            return true;
        }
    </script>
</body>

</html>
