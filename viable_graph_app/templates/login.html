<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log In</title>
    {% load static %}
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@400;600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            min-height: 100vh;
            background: #f5e6f0;
            color: #1a1a1a;
        }

        .page-wrap {
            position: relative;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem;
            overflow: hidden;
        }

        .page-wrap::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: url('{% static "images/log_in.png" %}');
            background-size: cover;
            background-position: center top;
            filter: brightness(0.95) saturate(0.85);
            z-index: 0;
        }

        /* pink wash overlay */
        .page-wrap::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(160deg,
                    rgba(255, 182, 220, 0.55) 0%,
                    rgba(255, 220, 240, 0.45) 50%,
                    rgba(240, 200, 230, 0.50) 100%);
            z-index: 1;
        }

        /* back button */
        .back-btn {
            position: absolute;
            left: 1.4rem;
            top: 1.4rem;
            z-index: 3;
            width: 2.6rem;
            height: 2.6rem;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.75);
            border: 1.5px solid rgba(200, 100, 160, 0.3);
            color: #c0187a;
            font-size: 1.2rem;
            display: grid;
            place-items: center;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s, transform 0.2s;
            backdrop-filter: blur(8px);
        }

        .back-btn:hover {
            background: rgba(255, 255, 255, 0.95);
            transform: translateX(-2px);
        }

        /* title above panel */
        .login-title {
            position: relative;
            z-index: 2;
            font-family: 'IBM Plex Sans Thai', sans-serif;
            font-size: clamp(3rem, 8vw, 5rem);
            font-weight: 700;
            color: #d4007a;
            letter-spacing: 0.04em;
            margin-bottom: 1.2rem;
            text-align: center;
            text-shadow: 0 2px 20px rgba(212, 0, 122, 0.18);
            animation: fadeDown 0.6s ease both;
        }

        @keyframes fadeDown {
            from {
                opacity: 0;
                transform: translateY(-16px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .login-panel {
            position: relative;
            z-index: 2;
            width: min(480px, 100%);
            background: rgba(255, 255, 255, 0.72);
            border: 1.5px solid rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(24px);
            border-radius: 28px;
            padding: 2.4rem 2.2rem 2rem;
            box-shadow: 0 12px 60px rgba(180, 0, 100, 0.12), 0 2px 8px rgba(0, 0, 0, 0.06);
            animation: fadeUp 0.6s ease 0.1s both;
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .panel-sub {
            text-align: center;
            color: rgba(80, 40, 60, 0.65);
            font-size: 0.93rem;
            margin-bottom: 1.6rem;
            font-weight: 400;
        }

        .login-form {
            display: grid;
            gap: 0.85rem;
        }

        /* inputs */
        .input-group {
            position: relative;
        }

        .input-group input {
            width: 100%;
            padding: 0.9rem 1rem 0.9rem 3.2rem;
            border-radius: 999px;
            border: 1.8px solid #1a1a1a;
            background: #ffffff;
            color: #1a1a1a;
            font-family: 'Outfit', sans-serif;
            font-size: 0.97rem;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-group input::placeholder {
            color: rgba(60, 30, 50, 0.4);
        }

        .input-group input:focus {
            border-color: #d4007a;
            box-shadow: 0 0 0 3px rgba(212, 0, 122, 0.10);
        }

        .input-icon {
            position: absolute;
            left: 1.1rem;
            top: 50%;
            transform: translateY(-50%);
            font-size: 1.1rem;
            color: rgba(60, 30, 50, 0.55);
            pointer-events: none;
        }

        .password-row {
            position: relative;
        }

        .password-toggle {
            position: absolute;
            right: 1.1rem;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            user-select: none;
            transition: opacity 0.2s;
        }

        .password-toggle:hover {
            opacity: 0.6;
        }

        .password-toggle:hover {
            color: #d4007a;
        }


        .bot-check .g-recaptcha {
            display: flex;
            justify-content: center;
        }

        /* error boxes */
        .error-box {
            display: none;
            color: #c0002a;
            font-size: 0.83rem;
            padding: 0.55rem 1rem;
            background: rgba(220, 0, 50, 0.07);
            border: 1px solid rgba(220, 0, 50, 0.25);
            border-radius: 10px;
            line-height: 1.6;
        }

        /* messages from Django */
        .messages {
            margin-bottom: 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .message {
            padding: 0.75rem 1rem;
            border-radius: 12px;
            font-size: 0.9rem;
            line-height: 1.4;
        }

        .message.error {
            border: 1px solid rgba(220, 0, 50, 0.35);
            background: rgba(220, 0, 50, 0.08);
            color: #9a0022;
        }

        .message.success {
            border: 1px solid rgba(0, 160, 80, 0.35);
            background: rgba(0, 160, 80, 0.08);
            color: #005a28;
        }

        /* login button */
        .login-button {
            display: block;
            width: 30%;
            margin: 0.4rem auto 0;
            padding: 0.9rem 1rem;
            border-radius: 999px;
            border: 2px solid #d4007a;
            background: #ffd7f5;
            color: #d4007a;
            font-family: 'Outfit', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s, color 0.2s, transform 0.15s;
            letter-spacing: 0.03em;
        }

        .login-button:hover {
            background: #d4007a;
            color: #ffffff;
            transform: translateY(-1px);
        }

        /* footer links */
        .login-footer {
            margin-top: 1.3rem;
            text-align: center;
            font-size: 0.93rem;
            color: rgba(80, 40, 60, 0.75);
        }

        .footer-links {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.3rem;
            margin-top: 0.5rem;
        }

        .footer-links a {
            color: #1a1a1a;
            text-decoration: none;
            font-weight: 500;
        }

        .footer-links a:hover {
            color: #d4007a;
            text-decoration: underline;
            text-underline-offset: 3px;
        }

        @media (max-width: 520px) {
            .login-panel {
                padding: 2rem 1.4rem 1.6rem;
            }

            .back-btn {
                top: 1rem;
                left: 1rem;
            }
        }
    </style>
</head>

<body>
    <div class="page-wrap">

        <button class="back-btn" onclick="history.back()" title="Go back">&#8592;</button>

        <h1 class="login-title">Log In</h1>

        <section class="login-panel" aria-labelledby="login-title">
            <p class="panel-sub">Sign in with your student account to continue.</p>

            {% if messages %}
            <div class="messages">
                {% for message in messages %}
                <div class="message {{ message.tags }}">{{ message }}</div>
                {% endfor %}
            </div>
            {% endif %}

            <form class="login-form" method="post" action="{% url 'login' %}" onsubmit="return checkForm(event)">
                {% csrf_token %}

                <div class="input-group">
                    <span class="input-icon" style="font-size: 180%; position: absolute; top: 40%;">🪪</span>
                    <input type="text" name="student_id" placeholder="Enter your student ID" autocomplete="username">
                </div>

                <div class="input-group password-row">
                    <span class="input-icon" style="font-size: 150%; position: absolute; top: 45%;">🔒</span>
                    <input id="password-input" type="password" name="password" placeholder="Enter Your Password"
                        autocomplete="current-password" oninput="validatePassword(this.value)">
                    <img id="toggle-icon" src="{% static 'images/eye_open.png' %}" class="password-toggle"
                        onclick="togglePassword()" width="22" height="22" title="Toggle password">
                </div>

                <div id="password-error" class="error-box"></div>

                <script src="https://www.google.com/recaptcha/api.js" async defer></script>

                <div class="bot-check">
                    <div class="g-recaptcha" data-sitekey="{{ RECAPTCHA_SITE_KEY }}" data-theme="light"></div>
                </div>

                <div id="recaptcha-error" class="error-box">
                    • กรุณากาช่อง "ฉันไม่ใช่โปรแกรมอัตโนมัติ" ก่อนล็อกอิน
                </div>

                <button type="submit" class="login-button">Log In</button>

                <div class="login-footer">
                    <div class="footer-links">
                        <span>Forget Password? <a href="{% url 'reset_password' %}">Reset Password</a></span>
                        <span>No Account? <a href="{% url 'sign_up' %}">Sign Up</a></span>
                    </div>
                </div>
            </form>
        </section>
    </div>

    <script>
        function togglePassword() {
            const input = document.getElementById('password-input');
            const icon = document.getElementById('toggle-icon');
            const eyeOpen = "{% static 'images/eye_open.png' %}";
            const eyeClose = "{% static 'images/eye_close.png' %}";

            if (input.type === 'password') {
                input.type = 'text';
                icon.src = eyeClose;
            } else {
                input.type = 'password';
                icon.src = eyeOpen;
            }
        }

        function validatePassword(value) {
            const errorBox = document.getElementById('password-error');
            const errors = [];

            if (value.length === 0) {
                errorBox.style.display = 'none';
                return;
            }

            if (value.length < 8)
                errors.push('• ต้องมีอย่างน้อย 8 ตัวอักษร');
            if (!/[a-z]/.test(value))
                errors.push('• ต้องมีตัวอักษรพิมพ์เล็ก (a-z)');
            if (!/[A-Z]/.test(value))
                errors.push('• ต้องมีตัวอักษรพิมพ์ใหญ่ (A-Z)');
            if (!/[0-9]/.test(value))
                errors.push('• ต้องมีตัวเลข (0-9)');
            if (!/[^a-zA-Z0-9]/.test(value))
                errors.push('• ต้องมีอักขระพิเศษ เช่น !@#$%');

            if (errors.length > 0) {
                errorBox.innerHTML = errors.join('<br>');
                errorBox.style.display = 'block';
            } else {
                errorBox.style.display = 'none';
            }
        }

        function checkForm(e) {
            const token = grecaptcha.getResponse();
            if (!token) {
                e.preventDefault();
                document.getElementById('recaptcha-error').style.display = 'block';
                return false;
            }
            document.getElementById('recaptcha-error').style.display = 'none';
            return true;
        }
    </script>
</body>

</html>
